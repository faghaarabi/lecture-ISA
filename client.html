<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTPOnly Cookie Demo</title>
</head>
<body>

<h2>Login</h2>
<input id="username" placeholder="username" />
<input id="password" placeholder="password" type="password" />
<button onclick="login()">Login</button>

<h2>Check Login</h2>
<button onclick="checkLogin()">Check</button>

<h2>Get Secret</h2>
<button onclick="getSecret()">Get Secret</button>

<h2>Logout</h2>
<button onclick="logout()">Logout</button>

<p id="result"></p>

<script>
const BASE_URL = "https://lecture-isa.onrender.com";

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${BASE_URL}/httponly-cookie/login`, {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    });

    document.getElementById("result").innerText =
        res.status === 200 ? "Logged in!" : "Login failed";
}

async function checkLogin() {
    const res = await fetch(`${BASE_URL}/httponly-cookie/check`, {
        method: "GET",
        credentials: "include"
    });

    document.getElementById("result").innerText =
        res.status === 200 ? "You are logged in" : "Not logged in";
}

async function getSecret() {
    const res = await fetch(`${BASE_URL}/httponly-cookie/something`, {
        method: "GET",
        credentials: "include"
    });

    if (res.status === 200) {
        const data = await res.json();
        document.getElementById("result").innerText = data.message;
    } else {
        document.getElementById("result").innerText = "Unauthorized";
    }
}

async function logout() {
    const res = await fetch(`${BASE_URL}/httponly-cookie/logout`, {
        method: "POST",
        credentials: "include"
    });

    document.getElementById("result").innerText =
        res.status === 200 ? "Logged out" : "Error";
}
</script>

</body>
</html>
